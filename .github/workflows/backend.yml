name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend-sw1-final/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

env:
  APP_NAME: backend
  RESOURCE_GROUP: moda-app-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.APP_NAME }}:${{ github.sha }}
          docker build -t $IMAGE ./backend-sw1-final
          docker push $IMAGE
          # Also tag as latest
          docker tag $IMAGE ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.APP_NAME }}:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.APP_NAME }}:latest

      - name: Run database migrations
        working-directory: backend-sw1-final
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm ci --omit=dev
          npx prisma migrate deploy

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.APP_NAME }}:${{ github.sha }}
